<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSRS Explorer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #1a0e00;
            color: #f0d080;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at top, #2a1500 0%, #1a0e00 60%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* ── PARTÍCULAS ── */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: #f0c040;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.3; }
            100% { transform: translateY(-20px) translateX(40px); opacity: 0; }
        }

        /* ── HEADER ── */
        .header { position: relative; z-index: 1; text-align: center; margin-bottom: 28px; }
        h1 {
            font-size: 2.2rem;
            color: #f0c040;
            text-shadow: 0 0 20px #f0a000aa, 0 2px 4px #000;
            letter-spacing: 2px;
            animation: glow 3s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #f0a000aa, 0 2px 4px #000; }
            to   { text-shadow: 0 0 30px #f0c000ff, 0 0 60px #f0800044, 0 2px 4px #000; }
        }
        .subtitle { color: #a08040; font-size: 0.85rem; margin-top: 4px; letter-spacing: 1px; }

        /* ── PAINEL ── */
        .panel {
            position: relative; z-index: 1;
            background: linear-gradient(180deg, #2a1a00 0%, #1e1200 100%);
            border: 1px solid #5a3a10;
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px #00000088, inset 0 1px 0 #6a4a2044;
        }
        .panel::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #c08030, transparent);
        }

        /* ── CONTROLS ── */
        .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .controls label { color: #a08040; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .controls input, .controls select {
            background: #0e0800;
            border: 1px solid #5a3a10;
            color: #f0d080;
            padding: 6px 10px;
            border-radius: 2px;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .controls input:focus, .controls select:focus { border-color: #c08030; }
        input[type="text"] { width: 200px; }

        button {
            background: linear-gradient(180deg, #7a4a10 0%, #5a3000 100%);
            color: #f0d080;
            border: 1px solid #c08030;
            padding: 8px 20px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 0.88rem;
            letter-spacing: 1px;
            transition: all 0.15s;
            text-shadow: 0 1px 2px #000;
            box-shadow: 0 2px 6px #00000066;
        }
        button:hover { background: linear-gradient(180deg, #9a5a18 0%, #7a4010 100%); border-color: #e0a040; }
        button:disabled { background: #2a1a00; color: #5a4020; border-color: #3a2a10; cursor: not-allowed; }

        .status { color: #7a6030; font-size: 0.8rem; font-style: italic; }
        #contador { color: #6a5020; font-size: 0.78rem; margin-bottom: 10px; }

        /* ── TABELA ── */
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; position: relative; z-index: 1; }
        thead { position: sticky; top: 0; }
        th {
            background: linear-gradient(180deg, #3a2200 0%, #2a1800 100%);
            color: #c09040;
            text-align: left;
            padding: 8px 10px;
            border-bottom: 2px solid #5a3a10;
            border-right: 1px solid #3a2200;
            cursor: pointer;
            user-select: none;
            letter-spacing: 0.5px;
            font-size: 0.8rem;
            transition: color 0.15s;
        }
        th:hover { color: #f0d080; }
        td {
            padding: 6px 10px;
            border-bottom: 1px solid #2a1800;
            border-right: 1px solid #221200;
            transition: background 0.1s;
        }
        tr:hover td { background: #2a1800; }
        tr:nth-child(even) td { background: #1e1200; }
        tr:nth-child(even):hover td { background: #2a1800; }

        .empty { color: #4a3010; font-style: italic; padding: 20px 0; font-size: 0.85rem; }

        .badge { padding: 2px 7px; border-radius: 2px; font-size: 0.72rem; letter-spacing: 0.5px; font-weight: bold; }
        .badge-members { background: #1a3a10; color: #60c040; border: 1px solid #2a5a18; }
        .badge-free    { background: #101a3a; color: #4080cc; border: 1px solid #182858; }

        .gp { color: #f0c040; }
        .muted { color: #4a3820; }

        /* ── PAGINAÇÃO ── */
        .pagination {
            display: flex; gap: 8px; align-items: center;
            margin-top: 14px; position: relative; z-index: 1;
        }
        .pagination button { padding: 5px 14px; font-size: 0.8rem; }
        .pagination span { color: #7a6030; font-size: 0.82rem; }

        /* ── DIVISOR ORNAMENTAL ── */
        .divider {
            text-align: center; color: #5a3a10; font-size: 1.2rem;
            margin: 6px 0; letter-spacing: 8px;
        }
    </style>
</head>
<body>

<!-- Partículas de ouro -->
<div class="particles" id="particles"></div>

<div class="header">
    <h1>⚔️ OSRS Grand Exchange ⚔️</h1>
    <div class="divider">— ✦ —</div>
    <p class="subtitle">Item Explorer · dados via OSRS Wiki API</p>
</div>

<div class="panel">
    <div class="controls">
        <label>🔍 Buscar: <input id="search" type="text" placeholder="nome do item..."></label>
        <label>Tipo:
            <select id="filterMembers">
                <option value="">Todos</option>
                <option value="true">Members</option>
                <option value="false">Free to Play</option>
            </select>
        </label>
        <label>Limite GE mín:
            <input id="filterLimit" type="number" value="0" min="0" style="width:80px">
        </label>
        <button id="btnCarregar" onclick="carregar()">▶ Carregar Itens</button>
        <span class="status" id="status"></span>
    </div>
</div>

<div id="contador"></div>

<div class="panel" style="padding:0;overflow:hidden;">
    <table>
        <thead>
            <tr>
                <th onclick="sortBy('id')">ID ↕</th>
                <th onclick="sortBy('name')">Nome ↕</th>
                <th onclick="sortBy('members')">Tipo ↕</th>
                <th onclick="sortBy('limit')">Limite GE ↕</th>
                <th onclick="sortBy('value')">Valor base ↕</th>
                <th onclick="sortBy('highalch')">High Alch ↕</th>
            </tr>
        </thead>
        <tbody id="tbl-itens">
            <tr><td colspan="6" class="empty" style="text-align:center">Clique em Carregar Itens</td></tr>
        </tbody>
    </table>
</div>

<div class="pagination">
    <button onclick="mudarPagina(-1)">◀ Anterior</button>
    <span id="pag-info">—</span>
    <button onclick="mudarPagina(1)">Próxima ▶</button>
</div>

<script>
// ── PARTÍCULAS ──
const container = document.getElementById("particles")
for (let i = 0; i < 25; i++) {
    const p = document.createElement("div")
    p.className = "particle"
    p.style.left     = Math.random() * 100 + "vw"
    p.style.width    = (Math.random() * 3 + 1) + "px"
    p.style.height   = p.style.width
    p.style.animationDuration  = (Math.random() * 15 + 10) + "s"
    p.style.animationDelay     = (Math.random() * 10) + "s"
    p.style.opacity  = Math.random() * 0.5
    container.appendChild(p)
}

// ── MÓDULO 1: DADOS BASE ──
let TODOS_ITENS = []
let itensFiltrados = []
let paginaAtual = 0
const POR_PAGINA = 50
let sortCol = 'name'
let sortAsc = true

function setStatus(msg) { document.getElementById("status").textContent = msg }

async function carregar() {
    const btn = document.getElementById("btnCarregar")
    btn.disabled = true
    setStatus("Baixando itens...")

    try {
        const res = await fetch("https://prices.runescape.wiki/api/v1/osrs/mapping", {
            headers: { "User-Agent": "osrs-explorer/1.0 - github.com/leronzoo" }
        })
        const data = await res.json()

        TODOS_ITENS = data.map(it => ({
            id:       it.id,
            name:     it.name      || "",
            examine:  it.examine   || "",
            members:  it.members   || false,
            limit:    it.limit     || 0,
            value:    it.value     || 0,
            lowalch:  it.lowalch   || 0,
            highalch: it.highalch  || 0,
        }))

        setStatus(`✓ ${TODOS_ITENS.length} itens carregados`)
        aplicarFiltros()

    } catch(e) {
        setStatus("Erro: " + e.message)
    }

    btn.disabled = false
}

function aplicarFiltros() {
    const busca   = document.getElementById("search").value.toLowerCase()
    const members = document.getElementById("filterMembers").value
    const limMin  = parseInt(document.getElementById("filterLimit").value) || 0

    itensFiltrados = TODOS_ITENS.filter(it => {
        if (busca   && !it.name.toLowerCase().includes(busca)) return false
        if (members !== "" && String(it.members) !== members)  return false
        if (it.limit < limMin) return false
        return true
    })

    itensFiltrados.sort((a, b) => {
        let va = a[sortCol], vb = b[sortCol]
        if (typeof va === "string") va = va.toLowerCase()
        if (typeof vb === "string") vb = vb.toLowerCase()
        if (va < vb) return sortAsc ? -1 : 1
        if (va > vb) return sortAsc ?  1 : -1
        return 0
    })

    paginaAtual = 0
    renderizar()
}

function renderizar() {
    const inicio = paginaAtual * POR_PAGINA
    const pagina = itensFiltrados.slice(inicio, inicio + POR_PAGINA)
    const totalPags = Math.ceil(itensFiltrados.length / POR_PAGINA)

    document.getElementById("contador").textContent =
        `${itensFiltrados.length} itens encontrados`

    document.getElementById("pag-info").textContent =
        `Página ${paginaAtual + 1} de ${totalPags || 1}`

    document.getElementById("tbl-itens").innerHTML = pagina.length === 0
        ? `<tr><td colspan="6" class="empty" style="text-align:center">Nenhum item encontrado</td></tr>`
        : pagina.map(it => `<tr>
            <td class="muted">${it.id}</td>
            <td>
            <a href="https://oldschool.runescape.wiki/w/${it.name.replace(/ /g, '_')}"
             target="_blank"
             style="color:#f0d080;text-decoration:none;">
             <b>${it.name}</b>
            </a>
          <br><span style="color:#4a3820;font-size:0.75rem">${it.examine}</span>
            </td>

            <td><span class="badge ${it.members ? 'badge-members' : 'badge-free'}">${it.members ? 'Members' : 'F2P'}</span></td>
            <td>${it.limit > 0 ? `<span class="gp">${it.limit.toLocaleString()}</span>` : `<span class="muted">—</span>`}</td>
            <td>${it.value > 0 ? `<span class="gp">${it.value.toLocaleString()} gp</span>` : `<span class="muted">—</span>`}</td>
            <td>${it.highalch > 0 ? `<span class="gp">${it.highalch.toLocaleString()} gp</span>` : `<span class="muted">—</span>`}</td>
          </tr>`).join("")
}

function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc
    else { sortCol = col; sortAsc = true }
    aplicarFiltros()
}

function mudarPagina(dir) {
    const totalPags = Math.ceil(itensFiltrados.length / POR_PAGINA)
    paginaAtual = Math.max(0, Math.min(totalPags - 1, paginaAtual + dir))
    renderizar()
}

document.getElementById("search").addEventListener("input", aplicarFiltros)
document.getElementById("filterMembers").addEventListener("change", aplicarFiltros)
document.getElementById("filterLimit").addEventListener("input", aplicarFiltros)
</script>
</body>
</html>
